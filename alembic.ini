[alembic]
# Script location — migrations live under ``migrations/``.
script_location = migrations

# Database URL is resolved dynamically from the Flask config at migration
# time (see migrations/env.py), so we leave sqlalchemy.url blank here.
sqlalchemy.url =

# Keep naming consistent with the existing ad-hoc migrate_*.py scripts so
# ops muscle memory ("migrate_XXX") still works. Timestamp prefix gives
# us stable ordering.
file_template = %%(year)d%%(month).2d%%(day).2d_%%(hour).2d%%(minute).2d_%%(slug)s

# Truncate slugs at 40 chars so filenames stay readable.
truncate_slug_length = 40

# Alembic defaults to `<script_location>/versions` for revisions — i.e.
# `migrations/versions` — which is exactly where our files live. We
# deliberately DO NOT set version_locations: that key gets split on
# whitespace, and this project's absolute path contains spaces
# ("untitled folder 2 copy 54/"), so the explicit path would be shredded
# into ['/Users/aryan/Desktop/DADA/untitled', 'folder', '2', 'copy',
# '54/migrations/versions'] and alembic would find zero migrations.
# Leave it unset; the default derivation from script_location is
# whitespace-safe.

# Timezone for timestamps in generated filenames.
timezone = UTC

# Output encoding.
output_encoding = utf-8

[post_write_hooks]
# No auto-formatting — migrations stay as written.

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
